name: fly-deploy
# Auto-deploys to Fly.io on every push to main.
#
# One-time setup (after the first manual `flyctl deploy`):
#   flyctl tokens create deploy --expiry 8760h        # 1 year
#   gh secret set FLY_API_TOKEN --body "<paste token>"
#
# Then every git push to main triggers this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group       # Cancel any in-flight deploy on a new push.
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
